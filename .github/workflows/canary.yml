name: Canary Validation

on:
  pull_request:
    paths:
      - "nest/**"
      - "src/canary/**"
      - "harnest.yaml"
      - "action.yml"
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated chick names to validate (empty = auto-detect changed)"
        required: false
        type: string
      enable_otel:
        description: "Start Jaeger sidecar for OTel telemetry"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  canary:
    name: Validate chicks
    runs-on: ubuntu-latest

    services:
      jaeger:
        image: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_otel) && 'jaegertracing/all-in-one:latest' || '' }}
        ports:
          - 16686:16686
          - 4317:4317
          - 4318:4318

    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_SITE: ${{ secrets.DD_SITE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Dogfood: use the local action.yml from this repo
      - name: Run canary
        uses: ./
        with:
          targets: ${{ inputs.targets || '' }}
          enable-otel: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_otel) && 'true' || 'false' }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-report
          path: .harnest/canary-report.md
          if-no-files-found: ignore
